name: Sync from Gitee

on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟检查一次
  workflow_dispatch:  # 允许手动触发
  repository_dispatch:
    types: [gitee-push]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Add Gitee remote
        run: |
          git remote add gitee https://didaima:2b57031739b7acfd94f7fe2975c1713b@gitee.com/didaima/pages.git

      - name: Fetch and sync
        run: |
          git fetch gitee main --force || git fetch gitee master --force
          git reset --hard gitee/main || git reset --hard gitee/master
          git push -f origin main || git push -f origin master
