<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>党员管理</title>
    <link rel="stylesheet" href="libs/element-ui.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .page { padding: 20px; }
        .search-card { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .table-card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .table-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .table-toolbar .title { font-size: 15px; font-weight: 600; color: #303133; }
    </style>
</head>
<body>
<div id="members">
<div class="page">
    <div class="search-card">
        <el-form :inline="true" size="small">
            <el-form-item label="姓名">
                <el-input v-model="searchForm.name" placeholder="请输入姓名" clearable></el-input>
            </el-form-item>
            <el-form-item label="所属支部">
                <el-select v-model="searchForm.branch" placeholder="请选择" clearable>
                    <el-option label="第一党支部" value="branch1"></el-option>
                    <el-option label="第二党支部" value="branch2"></el-option>
                    <el-option label="第三党支部" value="branch3"></el-option>
                    <el-option label="第四党支部" value="branch4"></el-option>
                    <el-option label="第五党支部" value="branch5"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item label="政治面貌">
                <el-select v-model="searchForm.status" placeholder="请选择" clearable>
                    <el-option label="正式党员" value="full"></el-option>
                    <el-option label="预备党员" value="probationary"></el-option>
                    <el-option label="入党积极分子" value="activist"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item label="入党时间">
                <el-date-picker v-model="searchForm.joinDate" type="daterange" range-separator="至" start-placeholder="开始日期" end-placeholder="结束日期" value-format="yyyy-MM-dd"></el-date-picker>
            </el-form-item>
            <el-form-item>
                <el-button type="primary" icon="el-icon-search">查询</el-button>
                <el-button icon="el-icon-refresh">重置</el-button>
            </el-form-item>
        </el-form>
    </div>

    <div class="table-card">
        <div class="table-toolbar">
            <span class="title">党员列表</span>
            <div>
                <el-button type="primary" size="small" icon="el-icon-plus" @click="openAddMember">新增党员</el-button>
                <el-button size="small" icon="el-icon-upload2">导入</el-button>
                <el-button size="small" icon="el-icon-download">导出</el-button>
            </div>
        </div>
        <el-table :data="tableData" border stripe style="width:100%">
            <el-table-column type="selection" width="50"></el-table-column>
            <el-table-column prop="id" label="编号" width="70"></el-table-column>
            <el-table-column prop="name" label="姓名" width="90"></el-table-column>
            <el-table-column prop="gender" label="性别" width="60"></el-table-column>
            <el-table-column prop="branch" label="所属支部" min-width="140"></el-table-column>
            <el-table-column prop="position" label="党内职务" min-width="120"></el-table-column>
            <el-table-column prop="joinDate" label="入党时间" width="110"></el-table-column>
            <el-table-column prop="status" label="政治面貌" width="100">
                <template slot-scope="scope">
                    <el-tag :type="scope.row.status === '正式党员' ? 'success' : scope.row.status === '预备党员' ? 'warning' : 'info'" size="small">{{ scope.row.status }}</el-tag>
                </template>
            </el-table-column>
            <el-table-column prop="education" label="学历" width="100"></el-table-column>
            <el-table-column prop="phone" label="联系电话" width="120"></el-table-column>
            <el-table-column label="操作" width="160" fixed="right">
                <template slot-scope="scope">
                    <el-button type="text" size="small">查看</el-button>
                    <el-button type="text" size="small">编辑</el-button>
                    <el-button type="text" size="small" style="color:#e53935;">删除</el-button>
                </template>
            </el-table-column>
        </el-table>
        <div style="margin-top:16px;text-align:right;">
            <el-pagination
                :current-page="currentPage"
                :page-sizes="[10, 20, 30, 50]"
                :page-size="pageSize"
                :total="total"
                layout="total, sizes, prev, pager, next, jumper"
                @size-change="handleSizeChange"
                @current-change="handlePageChange"
            ></el-pagination>
        </div>
    </div>

    <!-- 新增党员弹窗 -->
    <el-dialog title="新增党员" :visible.sync="addMemberVisible" width="600px" :close-on-click-modal="false">
        <el-form :model="memberForm" :rules="memberRules" ref="memberFormRef" label-width="90px" size="small">
            <el-row :gutter="16">
                <el-col :span="12">
                    <el-form-item label="姓名" prop="name">
                        <el-input v-model="memberForm.name" placeholder="请输入姓名"></el-input>
                    </el-form-item>
                </el-col>
                <el-col :span="12">
                    <el-form-item label="性别" prop="gender">
                        <el-select v-model="memberForm.gender" placeholder="请选择" style="width:100%;">
                            <el-option label="男" value="男"></el-option>
                            <el-option label="女" value="女"></el-option>
                        </el-select>
                    </el-form-item>
                </el-col>
            </el-row>
            <el-row :gutter="16">
                <el-col :span="12">
                    <el-form-item label="身份证号" prop="idNumber">
                        <el-input v-model="memberForm.idNumber" placeholder="请输入身份证号"></el-input>
                    </el-form-item>
                </el-col>
                <el-col :span="12">
                    <el-form-item label="所属支部" prop="branch">
                        <el-select v-model="memberForm.branch" placeholder="请选择" style="width:100%;">
                            <el-option label="第一党支部" value="第一党支部"></el-option>
                            <el-option label="第二党支部" value="第二党支部"></el-option>
                            <el-option label="第三党支部" value="第三党支部"></el-option>
                            <el-option label="第四党支部" value="第四党支部"></el-option>
                            <el-option label="第五党支部" value="第五党支部"></el-option>
                            <el-option label="第六党支部" value="第六党支部"></el-option>
                        </el-select>
                    </el-form-item>
                </el-col>
            </el-row>
            <el-row :gutter="16">
                <el-col :span="12">
                    <el-form-item label="党内职务" prop="position">
                        <el-input v-model="memberForm.position" placeholder="请输入职务"></el-input>
                    </el-form-item>
                </el-col>
                <el-col :span="12">
                    <el-form-item label="政治面貌" prop="status">
                        <el-select v-model="memberForm.status" placeholder="请选择" style="width:100%;">
                            <el-option label="正式党员" value="正式党员"></el-option>
                            <el-option label="预备党员" value="预备党员"></el-option>
                            <el-option label="入党积极分子" value="入党积极分子"></el-option>
                        </el-select>
                    </el-form-item>
                </el-col>
            </el-row>
            <el-row :gutter="16">
                <el-col :span="12">
                    <el-form-item label="入党时间" prop="joinDate">
                        <el-date-picker v-model="memberForm.joinDate" type="date" placeholder="请选择" value-format="yyyy-MM-dd" style="width:100%;"></el-date-picker>
                    </el-form-item>
                </el-col>
                <el-col :span="12">
                    <el-form-item label="学历" prop="education">
                        <el-select v-model="memberForm.education" placeholder="请选择" style="width:100%;">
                            <el-option label="博士" value="博士"></el-option>
                            <el-option label="研究生" value="研究生"></el-option>
                            <el-option label="本科" value="本科"></el-option>
                            <el-option label="大专" value="大专"></el-option>
                        </el-select>
                    </el-form-item>
                </el-col>
            </el-row>
            <el-form-item label="联系电话" prop="phone">
                <el-input v-model="memberForm.phone" placeholder="请输入联系电话"></el-input>
            </el-form-item>
        </el-form>
        <span slot="footer">
            <el-button size="small" @click="addMemberVisible = false">取消</el-button>
            <el-button type="primary" size="small" @click="submitMember">确认新增</el-button>
        </span>
    </el-dialog>
</div>
</div>

<script src="libs/vue.min.js"></script>
<script src="libs/element-ui.js"></script>
<script>
new Vue({
    el: '#members',
    data: {
        searchForm: { name: '', branch: '', status: '', joinDate: null },
        currentPage: 1,
        pageSize: 10,
        total: 38,
        tableData: [
            { id: 1, name: '张建国', gender: '男', branch: '第一党支部', position: '支部书记', joinDate: '2008-06-15', status: '正式党员', education: '研究生', phone: '138****6789' },
            { id: 2, name: '李红梅', gender: '女', branch: '第一党支部', position: '组织委员', joinDate: '2010-03-20', status: '正式党员', education: '本科', phone: '139****8901' },
            { id: 3, name: '王建军', gender: '男', branch: '第二党支部', position: '支部书记', joinDate: '2005-09-01', status: '正式党员', education: '研究生', phone: '137****1234' },
            { id: 4, name: '赵晓燕', gender: '女', branch: '第二党支部', position: '宣传委员', joinDate: '2012-07-01', status: '正式党员', education: '本科', phone: '136****5678' },
            { id: 5, name: '刘伟强', gender: '男', branch: '第三党支部', position: '支部书记', joinDate: '2007-11-10', status: '正式党员', education: '本科', phone: '135****9012' },
            { id: 6, name: '陈明华', gender: '男', branch: '第三党支部', position: '纪检委员', joinDate: '2014-05-20', status: '正式党员', education: '大专', phone: '158****3456' },
            { id: 7, name: '杨雪莲', gender: '女', branch: '第四党支部', position: '党员', joinDate: '2018-12-01', status: '预备党员', education: '研究生', phone: '159****7890' },
            { id: 8, name: '周文博', gender: '男', branch: '第五党支部', position: '党员', joinDate: '2020-06-15', status: '入党积极分子', education: '本科', phone: '186****2345' },
            { id: 9, name: '吴秀英', gender: '女', branch: '第一党支部', position: '党员', joinDate: '2016-08-20', status: '正式党员', education: '本科', phone: '187****6789' },
            { id: 10, name: '黄志远', gender: '男', branch: '第二党支部', position: '党员', joinDate: '2015-03-10', status: '正式党员', education: '大专', phone: '133****0123' }
        ],
        addMemberVisible: false,
        memberForm: { name: '', gender: '', idNumber: '', branch: '', position: '', status: '', joinDate: '', education: '', phone: '' },
        memberRules: {
            name: [{ required: true, message: '请输入姓名', trigger: 'blur' }],
            gender: [{ required: true, message: '请选择性别', trigger: 'change' }],
            branch: [{ required: true, message: '请选择所属支部', trigger: 'change' }],
            status: [{ required: true, message: '请选择政治面貌', trigger: 'change' }],
            joinDate: [{ required: true, message: '请选择入党时间', trigger: 'change' }]
        }
    },
    methods: {
        handleSizeChange(val) { this.pageSize = val; },
        handlePageChange(val) { this.currentPage = val; },
        openAddMember() {
            this.memberForm = { name: '', gender: '', idNumber: '', branch: '', position: '', status: '', joinDate: '', education: '', phone: '' };
            this.addMemberVisible = true;
        },
        submitMember() {
            var that = this;
            this.$refs.memberFormRef.validate(function(valid) {
                if (!valid) return false;
                var newMember = {
                    id: that.tableData.length + 1,
                    name: that.memberForm.name,
                    gender: that.memberForm.gender,
                    branch: that.memberForm.branch,
                    position: that.memberForm.position || '党员',
                    joinDate: that.memberForm.joinDate,
                    status: that.memberForm.status,
                    education: that.memberForm.education,
                    phone: that.memberForm.phone || '138****0000'
                };
                that.tableData.unshift(newMember);
                that.total = that.tableData.length;
                that.addMemberVisible = false;
                that.$message.success('新增党员成功！');
            });
        }
    }
});
</script>
</body>
</html>
