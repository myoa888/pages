<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通知公告</title>
    <link rel="stylesheet" href="libs/element-ui.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .page { padding: 20px; }
        .card { background: #fff; border-radius: 8px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 16px; }
        .card .card-title { font-size: 16px; font-weight: 600; color: #303133; padding-bottom: 14px; border-bottom: 1px solid #ebeef5; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .table-header { display: flex; align-items: center; padding: 10px 0; font-size: 13px; color: #909399; border-bottom: 2px solid #ebeef5; }
        .table-header .col { flex: 1; text-align: center; }
        .table-header .col-title { flex: 3; text-align: left; padding-left: 60px; }
        .notice-row {
            display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid #f2f3f5;
            cursor: pointer; transition: background 0.2s;
        }
        .notice-row:hover { background: #fafafa; }
        .notice-row .col { flex: 1; text-align: center; font-size: 13px; color: #606266; }
        .notice-row .col-type { flex: 1; text-align: center; }
        .notice-row .col-title-wrap { flex: 3; display: flex; align-items: center; padding-left: 10px; }
        .notice-icon-sm {
            width: 38px; height: 38px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #fff; margin-right: 12px; flex-shrink: 0;
        }
        .notice-txt { font-size: 14px; font-weight: 600; color: #303133; }
        .notice-txt:hover { color: #c62828; }
        .notice-desc-ellipsis { font-size: 12px; color: #909399; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 480px; }
        .pagination-wrap { margin-top: 16px; display: flex; justify-content: flex-end; }

        /* 详情弹窗 */
        .detail-header { display: flex; align-items: flex-start; margin-bottom: 20px; }
        .detail-icon { width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 26px; color: #fff; margin-right: 16px; flex-shrink: 0; }
        .detail-title { font-size: 20px; font-weight: 700; color: #303133; line-height: 1.4; }
        .detail-meta-line { font-size: 13px; color: #909399; margin-top: 6px; }
        .detail-meta-line span { margin-right: 20px; }
        .detail-body { background: #f7f8fa; border-radius: 8px; padding: 20px; font-size: 14px; color: #303133; line-height: 2; white-space: pre-wrap; margin-top: 16px; }
    </style>
</head>
<body>
<div id="notifications">
<div class="page">
    <div class="card">
        <div class="card-title">
            <span>通知公告</span>
            <div>
                <el-radio-group v-model="tab" size="small">
                    <el-radio-button label="all">全部</el-radio-button>
                    <el-radio-button label="notice">通知</el-radio-button>
                    <el-radio-button label="announce">公告</el-radio-button>
                    <el-radio-button label="document">文件</el-radio-button>
                </el-radio-group>
                <el-button type="primary" size="small" icon="el-icon-plus" style="margin-left:12px;" @click="openAddNotice">发布通知</el-button>
            </div>
        </div>

        <!-- 表头 -->
        <div class="table-header">
            <div class="col-type">类型</div>
            <div class="col-title">标题</div>
            <div class="col">发布单位</div>
            <div class="col">发布时间</div>
            <div class="col">阅读量</div>
        </div>

        <!-- 列表行 -->
        <div class="notice-row" v-for="item in pagedList" :key="item.id" @click="openDetail(item)">
            <div class="col-type">
                <el-tag :type="item.tagType" size="mini">{{ item.type }}</el-tag>
            </div>
            <div class="col-title-wrap">
                <div class="notice-icon-sm" :style="'background:' + item.bg">
                    <i :class="item.icon"></i>
                </div>
                <div>
                    <div class="notice-txt">{{ item.title }}</div>
                    <div class="notice-desc-ellipsis">{{ item.desc }}</div>
                </div>
            </div>
            <div class="col">{{ item.author }}</div>
            <div class="col">{{ item.time }}</div>
            <div class="col">{{ item.views }}</div>
        </div>

        <div v-if="pagedList.length === 0" style="text-align:center;padding:60px;color:#909399;">
            <i class="el-icon-document" style="font-size:48px;"></i>
            <p style="margin-top:12px;">暂无数据</p>
        </div>

        <div class="pagination-wrap">
            <el-pagination
                @current-change="handlePageChange"
                :current-page="currentPage"
                :page-size="pageSize"
                :total="filteredList.length"
                layout="total, prev, pager, next">
            </el-pagination>
        </div>
    </div>
</div>

    <!-- 发布通知弹窗 -->
    <el-dialog title="发布通知" :visible.sync="addNoticeVisible" width="580px" :close-on-click-modal="false">
        <el-form :model="noticeForm" :rules="noticeRules" ref="noticeFormRef" label-width="90px" size="small">
            <el-form-item label="通知标题" prop="title">
                <el-input v-model="noticeForm.title" placeholder="请输入通知标题"></el-input>
            </el-form-item>
            <el-form-item label="通知类型" prop="type">
                <el-select v-model="noticeForm.type" placeholder="请选择类型" style="width:100%;">
                    <el-option label="通知" value="通知"></el-option>
                    <el-option label="公告" value="公告"></el-option>
                    <el-option label="文件" value="文件"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item label="发布单位" prop="author">
                <el-input v-model="noticeForm.author" placeholder="请输入发布单位"></el-input>
            </el-form-item>
            <el-form-item label="通知内容" prop="desc">
                <el-input type="textarea" :rows="5" v-model="noticeForm.desc" placeholder="请输入通知内容"></el-input>
            </el-form-item>
        </el-form>
        <span slot="footer">
            <el-button size="small" @click="addNoticeVisible = false">取消</el-button>
            <el-button type="primary" size="small" @click="submitNotice">确认发布</el-button>
        </span>
    </el-dialog>

    <!-- 查看详情弹窗 -->
    <el-dialog :visible.sync="detailVisible" width="720px" :close-on-click-modal="false">
        <div slot="title" style="display:flex;align-items:center;">
            <span style="font-size:18px;font-weight:600;">通知详情</span>
        </div>
        <template v-if="detailItem">
            <div class="detail-header">
                <div class="detail-icon" :style="'background:' + detailItem.bg">
                    <i :class="detailItem.icon"></i>
                </div>
                <div style="flex:1;">
                    <div class="detail-title">
                        <el-tag :type="detailItem.tagType" size="small" style="margin-right:8px;vertical-align:middle;">{{ detailItem.type }}</el-tag>
                        {{ detailItem.title }}
                    </div>
                    <div class="detail-meta-line">
                        <span><i class="el-icon-user"></i> 发布单位：{{ detailItem.author }}</span>
                        <span><i class="el-icon-time"></i> 发布时间：{{ detailItem.time }}</span>
                        <span><i class="el-icon-view"></i> {{ detailItem.views }} 次阅读</span>
                    </div>
                </div>
            </div>
            <div class="detail-body">{{ detailItem.desc }}</div>
        </template>
        <span slot="footer">
            <el-button size="small" @click="detailVisible = false">关闭</el-button>
        </span>
    </el-dialog>
</div>

<script src="libs/vue.min.js"></script>
<script src="libs/element-ui.js"></script>
<script>
new Vue({
    el: '#notifications',
    data: {
        tab: 'all',
        currentPage: 1,
        pageSize: 8,
        addNoticeVisible: false,
        detailVisible: false,
        detailItem: null,
        curNoticeId: 10,
        noticeForm: { title: '', type: '', author: '', desc: '' },
        noticeRules: {
            title: [{ required: true, message: '请输入通知标题', trigger: 'blur' }],
            type: [{ required: true, message: '请选择通知类型', trigger: 'change' }],
            author: [{ required: true, message: '请输入发布单位', trigger: 'blur' }],
            desc: [{ required: true, message: '请输入通知内容', trigger: 'blur' }]
        },
        list: [
            { id: 1, title: '关于召开2026年度党建工作会议的通知', type: '通知', tagType: 'danger', icon: 'el-icon-s-flag', bg: 'linear-gradient(135deg,#e53935,#c62828)', desc: '各党总支、党支部：经党委研究决定，兹定于2026年6月20日召开2026年度党建工作会议。会议将总结上半年党建工作成效，部署下半年重点任务，并就当前党建工作面临的新形势新挑战进行深入研讨。请各支部做好参会准备，按要求报送参会人员名单。会议要求：一是各支部书记必须参加，二是各支部需准备上半年工作总结材料，三是参会人员需提前10分钟入场。请各支部高度重视，认真落实。', author: '党委办公室', time: '2026-06-10', views: 1256 },
            { id: 2, title: '关于开展"七一"表彰评选工作的通知', type: '通知', tagType: 'danger', icon: 'el-icon-s-custom', bg: 'linear-gradient(135deg,#1e88e5,#1565c0)', desc: '为庆祝中国共产党成立105周年，经党委研究决定，开展"七一"表彰评选工作。现将有关事项通知如下：一、表彰类别：先进党支部、优秀共产党员、优秀党务工作者。二、评选条件：先进党支部需在组织建设、思想建设、作风建设等方面表现突出；优秀共产党员需模范履行党员义务，在本职岗位上做出显著成绩；优秀党务工作者需热爱党务工作，积极探索新形势下党务工作的方法途径。三、评选程序：自下而上推荐，逐级审核上报。', author: '党委组织部', time: '2026-06-07', views: 2100 },
            { id: 3, title: '2026年第二季度党员发展对象公示', type: '公告', tagType: 'warning', icon: 'el-icon-s-check', bg: 'linear-gradient(135deg,#43a047,#2e7d32)', desc: '根据《中国共产党发展党员工作细则》要求，现将2026年第二季度党员发展对象予以公示。本次公示涉及6个党支部共12名发展对象，其中包括技术研发部门3人、市场部门2人、行政部门4人、生产部门3人。公示期自2026年6月6日至2026年6月12日，共7天。公示期间，如有异议，请以书面形式向党委组织部反映，反映情况要实事求是，提供具体事实或线索。联系电话：010-12345678。', author: '党委组织部', time: '2026-06-06', views: 1832 },
            { id: 4, title: '关于进一步加强党风廉政建设的实施意见', type: '文件', tagType: 'primary', icon: 'el-icon-document', bg: 'linear-gradient(135deg,#2563eb,#1e40af)', desc: '为深入贯彻落实全面从严治党要求，进一步加强党风廉政建设和反腐败工作，提出如下实施意见：一、强化政治引领，坚决做到"两个维护"。二、严肃党内政治生活，严格执行民主集中制。三、持之以恒正风肃纪，严格落实中央八项规定精神。四、加强纪律教育，引导党员干部知敬畏、存戒惧、守底线。五、完善监督体系，强化日常监督和专项检查。六、深化标本兼治，构建不敢腐、不能腐、不想腐的有效机制。', author: '纪委办公室', time: '2026-06-01', views: 3150 },
            { id: 5, title: '2026年5月份党费收缴情况通报', type: '公告', tagType: 'warning', icon: 'el-icon-s-finance', bg: 'linear-gradient(135deg,#fb8c00,#ef6c00)', desc: '现将2026年5月份各支部党费收缴情况进行通报。本月共收缴党费86,520元，整体收缴率达到98.7%，较上月提升0.3个百分点。其中，第一党支部收缴率100%、第二党支部收缴率99.2%、第三党支部收缴率98.5%、第四党支部收缴率97.8%、第五党支部收缴率98.0%、第六党支部收缴率98.6%。请各支部继续做好党费收缴工作，确保按时足额完成收缴任务。对于尚未交纳党费的党员，支部要及时提醒催缴。', author: '党委办公室', time: '2026-06-03', views: 968 },
            { id: 6, title: '关于组织参观革命纪念馆的通知', type: '通知', tagType: 'danger', icon: 'el-icon-s-home', bg: 'linear-gradient(135deg,#00897b,#00695c)', desc: '为深入开展党史学习教育，传承红色基因，定于2026年6月15日组织全体党员参观XX革命纪念馆。现将有关事项通知如下：一、参观时间：6月15日上午8:30在集团总部统一乘车前往。二、参加人员：全体党员及入党积极分子。三、参观内容：参观革命历史展览、重温入党誓词、现场学习交流。四、注意事项：请着正装、佩戴党徽，提前安排好工作，确因特殊情况不能参加的需提前一天向所在支部请假。', author: '党委宣传部', time: '2026-06-05', views: 1560 },
            { id: 7, title: '关于开展"学党史、守初心"知识竞赛的通知', type: '通知', tagType: 'danger', icon: 'el-icon-s-flag', bg: 'linear-gradient(135deg,#e53935,#c62828)', desc: '为持续深化党史学习教育成果，决定在全体党员中开展"学党史、守初心"知识竞赛活动。竞赛内容包括党章党规、党的历史、习近平新时代中国特色社会主义思想等。比赛分线上初赛和线下决赛两个阶段，初赛时间为6月25日-30日，决赛时间另行通知。各支部要广泛动员、认真组织，确保参与率达到100%。奖项设置：一等奖3名、二等奖6名、三等奖10名、优秀组织奖2个。', author: '党委宣传部', time: '2026-06-08', views: 890 },
            { id: 8, title: '关于做好2026年发展党员工作的通知', type: '文件', tagType: 'primary', icon: 'el-icon-document', bg: 'linear-gradient(135deg,#1e88e5,#1565c0)', desc: '为进一步做好2026年发展党员工作，提高发展党员质量，优化党员队伍结构，现就有关事项通知如下：一、严格坚持党员标准，始终把政治标准放在首位。二、规范发展程序，严格落实5个阶段25个步骤。三、突出发展重点，注重在青年骨干、技术能手中发展党员。四、加强计划管理，各支部年度发展计划需报党委审批。五、落实工作责任，支部书记是第一责任人。', author: '党委组织部', time: '2026-06-02', views: 1420 }
        ]
    },
    methods: {
        handlePageChange(val) { this.currentPage = val; },
        openAddNotice() {
            this.noticeForm = { title: '', type: '', author: '', desc: '' };
            this.addNoticeVisible = true;
        },
        submitNotice() {
            var that = this;
            this.$refs.noticeFormRef.validate(function(valid) {
                if (!valid) return false;
                var bgs = ['linear-gradient(135deg,#e53935,#c62828)', 'linear-gradient(135deg,#1e88e5,#1565c0)', 'linear-gradient(135deg,#43a047,#2e7d32)', 'linear-gradient(135deg,#2563eb,#1e40af)', 'linear-gradient(135deg,#fb8c00,#ef6c00)', 'linear-gradient(135deg,#00897b,#00695c)'];
                var icons = ['el-icon-s-flag', 'el-icon-s-custom', 'el-icon-s-check', 'el-icon-document', 'el-icon-s-finance', 'el-icon-s-home'];
                var typeMap = { '通知': 'danger', '公告': 'warning', '文件': 'primary' };
                var idx = ++that.curNoticeId % bgs.length;
                var now = new Date();
                var timeStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
                var newNotice = {
                    id: that.curNoticeId,
                    title: that.noticeForm.title,
                    type: that.noticeForm.type,
                    tagType: typeMap[that.noticeForm.type] || 'info',
                    icon: icons[idx],
                    bg: bgs[idx],
                    desc: that.noticeForm.desc,
                    author: that.noticeForm.author,
                    time: timeStr,
                    views: 0
                };
                that.list.unshift(newNotice);
                that.addNoticeVisible = false;
                that.$message.success('发布通知成功！');
            });
        },
        openDetail(item) {
            this.detailItem = item;
            item.views++;
            this.detailVisible = true;
        }
    },
    computed: {
        filteredList() {
            if (this.tab === 'all') return this.list;
            var typeMap = { notice: '通知', announce: '公告', document: '文件' };
            return this.list.filter(function(item) { return item.type === typeMap[this.tab]; }.bind(this));
        },
        pagedList() {
            var start = (this.currentPage - 1) * this.pageSize;
            return this.filteredList.slice(start, start + this.pageSize);
        }
    }
});
</script>
</body>
</html>
