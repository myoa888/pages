<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>意见反馈</title>
    <link rel="stylesheet" href="libs/element-ui.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .page { padding: 20px; max-width: 1200px; }
        .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .stat-box { background: #fff; border-radius: 8px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); text-align: center; }
        .stat-box .num { font-size: 28px; font-weight: 700; color: #303133; }
        .stat-box .txt { font-size: 13px; color: #909399; margin-top: 6px; }
        .card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 16px; }
        .card .card-title { font-size: 15px; font-weight: 600; color: #303133; padding-bottom: 12px; border-bottom: 1px solid #ebeef5; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
<div id="complaint">
<div class="page">
    <div class="stat-row">
        <div class="stat-box"><div class="num" style="color:#e53935;">128</div><div class="txt">总反馈数</div></div>
        <div class="stat-box"><div class="num" style="color:#1e88e5;">115</div><div class="txt">已处理</div></div>
        <div class="stat-box"><div class="num" style="color:#43a047;">89.8<span style="font-size:16px;">%</span></div><div class="txt">处理率</div></div>
        <div class="stat-box"><div class="num" style="color:#fb8c00;">13</div><div class="txt">待处理</div></div>
    </div>

    <div class="card">
        <div class="card-title">
            <span>反馈列表</span>
            <el-button type="primary" size="small" icon="el-icon-edit" @click="openAddFeedback">提交反馈</el-button>
        </div>
        <el-table :data="feedbackList" border stripe style="width:100%">
            <el-table-column type="index" label="序号" width="60" align="center"></el-table-column>
            <el-table-column prop="title" label="反馈标题" min-width="200"></el-table-column>
            <el-table-column prop="submitter" label="提交人" width="100"></el-table-column>
            <el-table-column prop="branch" label="所属支部" min-width="140"></el-table-column>
            <el-table-column prop="type" label="类型" width="100" align="center">
                <template slot-scope="scope">
                    <el-tag :type="scope.row.type === '建议' ? 'success' : scope.row.type === '问题' ? 'danger' : 'warning'" size="small">{{ scope.row.type }}</el-tag>
                </template>
            </el-table-column>
            <el-table-column prop="time" label="提交时间" width="110" align="center"></el-table-column>
            <el-table-column label="状态" width="100" align="center">
                <template slot-scope="scope">
                    <el-tag :type="scope.row.status === '已处理' ? 'success' : 'warning'" size="small">{{ scope.row.status }}</el-tag>
                </template>
            </el-table-column>
            <el-table-column label="操作" width="120" align="center">
                <template>
                    <el-button type="text" size="small">查看</el-button>
                    <el-button type="text" size="small">回复</el-button>
                </template>
            </el-table-column>
        </el-table>
        <div style="margin-top:16px;text-align:right;">
            <el-pagination :current-page="1" :page-size="10" :total="128" layout="total, prev, pager, next, jumper"></el-pagination>
        </div>
    </div>
</div>

    <!-- 提交反馈弹窗 -->
    <el-dialog title="提交反馈" :visible.sync="addFeedbackVisible" width="520px" :close-on-click-modal="false">
        <el-form :model="feedbackForm" :rules="feedbackRules" ref="feedbackFormRef" label-width="90px" size="small">
            <el-form-item label="反馈标题" prop="title">
                <el-input v-model="feedbackForm.title" placeholder="请输入反馈标题"></el-input>
            </el-form-item>
            <el-form-item label="反馈类型" prop="type">
                <el-select v-model="feedbackForm.type" placeholder="请选择类型" style="width:100%;">
                    <el-option label="建议" value="建议"></el-option>
                    <el-option label="问题" value="问题"></el-option>
                    <el-option label="其他" value="其他"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item label="所属支部" prop="branch">
                <el-select v-model="feedbackForm.branch" placeholder="请选择" style="width:100%;">
                    <el-option label="第一党支部" value="第一党支部"></el-option>
                    <el-option label="第二党支部" value="第二党支部"></el-option>
                    <el-option label="第三党支部" value="第三党支部"></el-option>
                    <el-option label="第四党支部" value="第四党支部"></el-option>
                    <el-option label="第五党支部" value="第五党支部"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item label="提交人" prop="submitter">
                <el-input v-model="feedbackForm.submitter" placeholder="请输入您的姓名"></el-input>
            </el-form-item>
            <el-form-item label="反馈内容" prop="content">
                <el-input type="textarea" :rows="4" v-model="feedbackForm.content" placeholder="请详细描述您的意见或建议"></el-input>
            </el-form-item>
        </el-form>
        <span slot="footer">
            <el-button size="small" @click="addFeedbackVisible = false">取消</el-button>
            <el-button type="primary" size="small" @click="submitFeedback">确认提交</el-button>
        </span>
    </el-dialog>
</div>

<script src="libs/vue.min.js"></script>
<script src="libs/element-ui.js"></script>
<script>
new Vue({
    el: '#complaint',
    data: {
        addFeedbackVisible: false,
        feedbackForm: { title: '', type: '', branch: '', submitter: '', content: '' },
        feedbackRules: {
            title: [{ required: true, message: '请输入反馈标题', trigger: 'blur' }],
            type: [{ required: true, message: '请选择反馈类型', trigger: 'change' }],
            branch: [{ required: true, message: '请选择所属支部', trigger: 'change' }],
            submitter: [{ required: true, message: '请输入提交人', trigger: 'blur' }]
        },
        feedbackList: [
            { title: '建议增加线上党费缴纳功能', submitter: '李明远', branch: '第一党支部', type: '建议', time: '2026-06-08', status: '已处理' },
            { title: '希望丰富党建学习资料库内容', submitter: '张小红', branch: '第三党支部', type: '建议', time: '2026-06-07', status: '已处理' },
            { title: '会议室预约系统出现错误', submitter: '王建国', branch: '第二党支部', type: '问题', time: '2026-06-09', status: '处理中' },
            { title: '建议优化党员考核指标体系', submitter: '陈晓华', branch: '第四党支部', type: '建议', time: '2026-06-05', status: '已处理' },
            { title: '志愿活动报名流程需要改进', submitter: '赵伟', branch: '第一党支部', type: '建议', time: '2026-06-10', status: '处理中' },
            { title: '党费缴纳记录查询不方便', submitter: '刘芳', branch: '第五党支部', type: '问题', time: '2026-06-06', status: '已处理' }
        ]
    },
    methods: {
        openAddFeedback() {
            this.feedbackForm = { title: '', type: '', branch: '', submitter: '', content: '' };
            this.addFeedbackVisible = true;
        },
        submitFeedback() {
            var that = this;
            this.$refs.feedbackFormRef.validate(function(valid) {
                if (!valid) return false;
                var now = new Date();
                var timeStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
                var newFeedback = {
                    title: that.feedbackForm.title,
                    submitter: that.feedbackForm.submitter,
                    branch: that.feedbackForm.branch,
                    type: that.feedbackForm.type,
                    time: timeStr,
                    status: '处理中'
                };
                that.feedbackList.unshift(newFeedback);
                that.addFeedbackVisible = false;
                that.$message.success('提交反馈成功！');
            });
        }
    }
});
</script>
</body>
</html>
