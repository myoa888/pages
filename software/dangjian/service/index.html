<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧党建管理系统</title>
    <link rel="stylesheet" href="libs/element-ui.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #app { height: 100%; overflow: hidden; }

        .app-container { display: flex; height: 100%; }

        /* 左侧菜单 */
        .sidebar {
            width: 230px;
            height: 100%;
            background: linear-gradient(180deg, #c62828 0%, #b71c1c 100%);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: 2px 0 12px rgba(0,0,0,0.15);
            z-index: 10;
        }
        .logo-area {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        .logo-area .logo-icon {
            width: 36px; height: 36px;
            background: #ffd54f;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #c62828;
            font-weight: bold;
            margin-right: 10px;
        }
        .logo-area .logo-text {
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .menu-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .menu-wrap::-webkit-scrollbar { width: 4px; }
        .menu-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

        .el-menu {
            border-right: none !important;
            background: transparent !important;
        }
        /* 一级菜单 */
        .el-menu .el-menu-item {
            color: rgba(255,255,255,0.75) !important;
            height: 46px;
            line-height: 46px;
            margin: 2px 10px;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.25s;
        }
        .el-menu .el-menu-item i { color: rgba(255,255,255,0.7); }
        .el-menu .el-menu-item:hover {
            background: rgba(255,255,255,0.12) !important;
            color: #fff !important;
        }
        .el-menu .el-menu-item:hover i { color: #fff; }
        .el-menu .el-menu-item.is-active {
            background: rgba(255,255,255,0.2) !important;
            color: #fff !important;
            font-weight: 600;
        }
        .el-menu .el-menu-item.is-active i { color: #ffd54f; }

        /* 子菜单 */
        .el-menu .el-submenu .el-submenu__title {
            color: rgba(255,255,255,0.75) !important;
            height: 46px;
            line-height: 46px;
            margin: 2px 10px;
            border-radius: 6px;
            font-size: 14px;
        }
        .el-menu .el-submenu .el-submenu__title i { color: rgba(255,255,255,0.7); }
        .el-menu .el-submenu .el-submenu__title:hover {
            background: rgba(255,255,255,0.12) !important;
            color: #fff !important;
        }
        .el-menu .el-submenu .el-submenu__title:hover i { color: #fff; }
        .el-menu--inline {
            background: rgba(0,0,0,0.15) !important;
            margin: 0 10px;
            border-radius: 6px;
        }
        .el-menu--inline .el-menu-item {
            padding-left: 56px !important;
            height: 40px;
            line-height: 40px;
            font-size: 13px;
        }

        /* 右侧主体 */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #f0f2f5;
        }
        .top-bar {
            height: 50px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            z-index: 5;
            flex-shrink: 0;
        }
        .top-bar .breadcrumb { font-size: 14px; color: #606266; }
        .top-bar .breadcrumb span { color: #999; }
        .top-bar-right { display: flex; align-items: center; gap: 16px; }
        .top-bar-right .user-info { display: flex; align-items: center; cursor: pointer; }
        .top-bar-right .user-avatar {
            width: 32px; height: 32px;
            background: #c62828;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            margin-right: 8px;
        }
        .content-area {
            flex: 1;
            overflow: hidden;
        }
        .content-area iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #f0f2f5;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="app-container">
        <!-- 左侧菜单 -->
        <div class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">党</div>
                <div class="logo-text">智慧党建管理系统</div>
            </div>
            <div class="menu-wrap">
                <el-menu
                    :default-active="activeMenu"
                    @select="handleSelect"
                    background-color="transparent"
                    text-color="rgba(255,255,255,0.75)"
                    active-text-color="#fff"
                    :unique-opened="true"
                >
                    <el-menu-item index="dashboard">
                        <i class="el-icon-s-home"></i>
                        <span>首页概览</span>
                    </el-menu-item>

                    <el-submenu index="party">
                        <template slot="title">
                            <i class="el-icon-s-flag"></i>
                            <span>党组织管理</span>
                        </template>
                        <el-menu-item index="organization">组织架构</el-menu-item>
                        <el-menu-item index="members">党员管理</el-menu-item>
                        <el-menu-item index="dues">党费管理</el-menu-item>
                    </el-submenu>

                    <el-submenu index="build">
                        <template slot="title">
                            <i class="el-icon-s-data"></i>
                            <span>党建工作</span>
                        </template>
                        <el-menu-item index="activities">党建活动</el-menu-item>
                        <el-menu-item index="meetings">三会一课</el-menu-item>
                        <el-menu-item index="education">学习教育</el-menu-item>
                        <el-menu-item index="assessment">考核评估</el-menu-item>
                    </el-submenu>

                    <el-submenu index="service">
                        <template slot="title">
                            <i class="el-icon-s-cooperation"></i>
                            <span>党群服务</span>
                        </template>
                        <el-menu-item index="volunteer">志愿服务</el-menu-item>
                        <el-menu-item index="complaint">意见反馈</el-menu-item>
                        <el-menu-item index="service-hall">服务大厅</el-menu-item>
                    </el-submenu>

                    <el-menu-item index="reports">
                        <i class="el-icon-s-marketing"></i>
                        <span>报表统计</span>
                    </el-menu-item>

                    <el-menu-item index="notifications">
                        <i class="el-icon-bell"></i>
                        <span>通知公告</span>
                    </el-menu-item>

                    <el-menu-item index="settings">
                        <i class="el-icon-setting"></i>
                        <span>系统设置</span>
                    </el-menu-item>
                </el-menu>
            </div>
        </div>

        <!-- 右侧主体 -->
        <div class="main-area">
            <div class="top-bar">
                <div class="breadcrumb">
                    <i class="el-icon-location-outline" style="margin-right:6px;color:#c62828;"></i>
                    当前位置：<span>首页</span> / {{ breadcrumbTitle }}
                </div>
                <div class="top-bar-right">
                    <el-badge :value="3" :max="99">
                        <i class="el-icon-bell" style="font-size:18px;color:#606266;cursor:pointer;"></i>
                    </el-badge>
                    <div class="user-info">
                        <div class="user-avatar">张</div>
                        <span style="font-size:14px;color:#303133;">张书记</span>
                        <i class="el-icon-arrow-down" style="margin-left:4px;color:#999;"></i>
                    </div>
                </div>
            </div>
            <div class="content-area">
                <iframe :src="iframeSrc" ref="iframe" @load="onIframeLoad"></iframe>
            </div>
        </div>
    </div>
</div>

<script src="libs/vue.min.js"></script>
<script src="libs/element-ui.js"></script>
<script>
new Vue({
    el: '#app',
    data: {
        activeMenu: 'dashboard',
        iframeSrc: 'dashboard.html',
        menuTitles: {
            dashboard: '首页概览',
            organization: '组织架构',
            members: '党员管理',
            dues: '党费管理',
            activities: '党建活动',
            meetings: '三会一课',
            education: '学习教育',
            assessment: '考核评估',
            volunteer: '志愿服务',
            complaint: '意见反馈',
            'service-hall': '服务大厅',
            reports: '报表统计',
            notifications: '通知公告',
            settings: '系统设置'
        }
    },
    computed: {
        breadcrumbTitle() {
            return this.menuTitles[this.activeMenu] || '';
        }
    },
    methods: {
        handleSelect(index) {
            this.activeMenu = index;
            var pageMap = {
                dashboard: 'dashboard.html',
                organization: 'organization.html',
                members: 'members.html',
                dues: 'dues.html',
                activities: 'activities.html',
                meetings: 'meetings.html',
                education: 'education.html',
                assessment: 'assessment.html',
                volunteer: 'volunteer.html',
                complaint: 'complaint.html',
                'service-hall': 'service-hall.html',
                reports: 'reports.html',
                notifications: 'notifications.html',
                settings: 'settings.html'
            };
            this.iframeSrc = pageMap[index] || 'dashboard.html';
        },
        onIframeLoad() {
            // iframe加载完成
        }
    }
});
</script>
</body>
</html>
